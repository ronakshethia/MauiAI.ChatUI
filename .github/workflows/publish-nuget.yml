name: Publish NuGet

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  DOTNET_VERSION: 10.0.x

jobs:
  publish:
    runs-on: windows-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Install MAUI workloads
      - name: Install MAUI workloads
        shell: pwsh
        run: dotnet workload install maui android ios maccatalyst maui-windows

      # Set version (handles push, manual, tags)
      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match "refs/tags/v(.+)") {
            $version = $Matches[1]
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "1.0.${{ github.run_number }}"
          }
          else {
            $version = "1.0.${{ github.run_number }}-ci"
          }

          echo "VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Version: $version"

      # Restore
      - name: Restore
        run: dotnet restore src/MauiAI.ChatUI/MauiAI.ChatUI.csproj

      # Build
      - name: Build
        run: dotnet build src/MauiAI.ChatUI/MauiAI.ChatUI.csproj -c Release --no-restore

      # Pack
      - name: Pack
        run: >
          dotnet pack src/MauiAI.ChatUI/MauiAI.ChatUI.csproj
          -c Release
          --no-build
          -p:PackageVersion=${{ env.VERSION }}
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
          -o artifacts/nuget

      # Upload artifacts (so you can download locally)
      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg

      # Validate API key
      - name: Validate API Key
        shell: pwsh
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "❌ NUGET_API_KEY is missing"
          } else {
            Write-Host "✅ API key found"
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      # Publish to NuGet (runs on ALL triggers)
      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $packages = Get-ChildItem "artifacts/nuget/*.nupkg"

          if ($packages.Count -eq 0) {
            Write-Error "❌ No .nupkg files found"
          }

          foreach ($pkg in $packages) {
            Write-Host "🚀 Publishing $($pkg.Name)"

            dotnet nuget push $pkg.FullName `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

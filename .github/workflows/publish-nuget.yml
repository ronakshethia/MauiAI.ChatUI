name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workloads
        shell: pwsh
        run: dotnet workload install maui maui-windows android

      - name: Restore
        shell: pwsh
        run: dotnet restore src/MauiAI.ChatUI/MauiAI.ChatUI.csproj

      - name: Build
        shell: pwsh
        run: dotnet build src/MauiAI.ChatUI/MauiAI.ChatUI.csproj -c Release --no-restore -v:minimal

      - name: Pack
        shell: pwsh
        run: >
          dotnet pack src/MauiAI.ChatUI/MauiAI.ChatUI.csproj
          -c Release
          --no-build
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
          -o artifacts/nuget

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MauiAI.ChatUI-nuget
          path: artifacts/nuget/*

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "artifacts/nuget/*.nupkg"
          --api-key "$env:NUGET_API_KEY"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

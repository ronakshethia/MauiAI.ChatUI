name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workloads
        shell: pwsh
        run: dotnet workload install maui android ios maccatalyst maui-windows

      - name: Restore
        run: dotnet restore src/MauiAI.ChatUI/MauiAI.ChatUI.csproj

      - name: Build
        run: dotnet build src/MauiAI.ChatUI/MauiAI.ChatUI.csproj -c Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/MauiAI.ChatUI/MauiAI.ChatUI.csproj
          -c Release
          --no-build
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
          -o artifacts/nuget

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key $NUGET_API_KEY \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

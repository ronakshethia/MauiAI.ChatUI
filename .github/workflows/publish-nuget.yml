name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      # Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Install MAUI workloads (all targets)
      - name: Install MAUI workloads
        shell: pwsh
        run: dotnet workload install maui android ios maccatalyst maui-windows

      # Restore
      - name: Restore
        run: dotnet restore src/MauiAI.ChatUI/MauiAI.ChatUI.csproj

      # Build
      - name: Build
        run: dotnet build src/MauiAI.ChatUI/MauiAI.ChatUI.csproj -c Release --no-restore

      # Pack
      - name: Pack
        run: >
          dotnet pack src/MauiAI.ChatUI/MauiAI.ChatUI.csproj
          -c Release
          --no-build
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
          -o artifacts/nuget

      # Debug: list generated packages
      - name: List packages
        shell: pwsh
        run: |
          Write-Host "Generated packages:"
          Get-ChildItem artifacts/nuget

      # Debug: check API key
      - name: Validate API Key
        shell: pwsh
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "❌ NUGET_API_KEY is missing"
          } else {
            Write-Host "✅ API key found"
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      # Publish to NuGet (FIXED)
      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $packages = Get-ChildItem "artifacts/nuget/*.nupkg"

          if ($packages.Count -eq 0) {
            Write-Error "❌ No .nupkg files found"
          }

          foreach ($pkg in $packages) {
            Write-Host "🚀 Publishing $($pkg.Name)"

            dotnet nuget push $pkg.FullName `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
